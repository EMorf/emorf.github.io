<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ruru's wall</title>
  <meta name="description" content="Ruru spending time doing what he likes in a full-screen gallery.">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <link rel="canonical" href="https://morfiadakis.au/cute_penguin/">
  <link rel="icon" href="images/IMG_20240517_214222_054.jpg" type="image/jpeg">
  <link rel="stylesheet" href="../css/bootstrap.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
    html, body { min-height: 100dvh; }
    body { background: #020617; color: #f8fafc; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0; padding: 0; font-family: 'Roboto', 'Helvetica Neue', Arial, sans-serif; position: relative; }
    body::before, body::after { content: ""; flex-grow: 1; }
    .slideshow { width: 100%; max-width: 500px; display: flex; align-items: center; justify-content: center; z-index: 1; }
    .slide-card { width: 100%; border: none; background: rgba(10,15,30,0.96); box-shadow: 0 30px 80px rgba(8,18,50,.45); display: flex; flex-direction: column; }
    .slide-view { position: relative; overflow: hidden; flex: 1; background: #000; display: flex; align-items: center; justify-content: center; aspect-ratio: 1 / 1; width: 100%; }
    .slide-view img { position: relative; z-index: 0; width: 100%; height: 100%; object-fit: contain; transition: opacity .45s ease; display: block; user-select: none; -webkit-user-drag: none; }
    .heart-rain { position:absolute; inset:0; pointer-events:none; overflow:hidden; z-index:2; }
    .heart-rain .heart { position:absolute; top:-2rem; color:#ff8ab0; font-size:1.25rem; opacity:0; animation:rain 5s linear forwards; text-shadow:0 0 12px rgba(255,138,176,.45); }
    @keyframes rain { 0% { transform: translate3d(0,-20px,0) scale(0.7); opacity:0; }
      10% { opacity:.9; }
      100% { transform: translate3d(0,110vh,0) scale(0.85); opacity:0; }
    }
    .card-body { padding: 1.5rem 1.75rem 2rem; display: flex; flex-direction: column; justify-content: flex-start; flex-shrink: 0; }
    .slide-meta { display:flex; justify-content:space-between; align-items:flex-start; gap:1.25rem; flex-wrap:wrap; }
    .slide-header { max-width:calc(100% - 180px); min-height: 160px; }
    .slide-header h1 { font-size:2.35rem; font-weight:700; margin:0; letter-spacing:.02em; }
    .slide-header p { margin:.5rem 0 0; color:#cbd5e1; font-size:1rem; line-height:1.55; min-height: 1.55em; }
    .slide-meta small { color:#7f9cf5; display:block; margin-top:.75rem; }
    .details { margin-top:1.5rem; border:1px solid rgba(148,163,184,.18); background:rgba(255,255,255,.04); border-radius:.85rem; padding:1.25rem; }
    .details p { margin:0; color:#e2e8f0; font-size:1rem; line-height:1.75; }
    .btn-pink { background:#ff8ab0; border-color:#ff7aa0; color:#111; font-weight:700; box-shadow:0 12px 26px rgba(255,138,176,.18); white-space: nowrap; touch-action: manipulation; }
    .btn-pink:hover, .btn-pink:focus { background:#ff6b8a; border-color:#ff5b7b; color:#fff; }
    .slide-actions { display:flex; gap:0.5rem; align-items:center; flex-wrap: wrap; justify-content: center; margin-top: 1rem; }
    .slide-actions .btn { display: flex; align-items: center; justify-content: center; min-height: 48px; font-size: 1.25rem; }
    .kiss-overlay { position:absolute; inset:0; pointer-events:none; z-index:999; }
    .lip { position:absolute; font-size:3.25rem; transform:translate(-50%,-50%) scale(0.9); animation:pop 0.18s ease-out forwards; }
    @keyframes pop { 0% { transform:translate(-50%,-50%) scale(0.5); opacity:0; }
      60% { transform:translate(-50%,-50%) scale(1.12); opacity:1; }
      100% { transform:translate(-50%,-50%) scale(1); opacity:1; }
    }
    .days-counter { font-weight: 700; color: #ff8ab0; margin-bottom: 0.5rem; display: block; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .brat-mode-toggle { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; user-select: none; margin-top: 0.5rem; }
    .brat-mode-toggle input { cursor: pointer; }
    .sticker-item { position: absolute; cursor: move; font-size: 3rem; user-select: none; z-index: 10; touch-action: none; pointer-events: auto; }
    .fish-animation { position: absolute; font-size: 2.5rem; z-index: 50; animation: fish-swim 1s ease-in-out forwards; }
    @keyframes fish-swim {
      0% { transform: translate(-50%, 100%) rotate(0deg); opacity: 0; }
      50% { opacity: 1; transform: translate(-50%, 50%) rotate(-20deg); }
      100% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
    }

    .sparkle {
      position: absolute;
      width: 10px;
      height: 10px;
      background: #ff8ab0;
      border-radius: 50%;
      pointer-events: none;
      z-index: 100;
      animation: sparkle-fade 0.8s ease-out forwards;
      box-shadow: 0 0 10px rgba(255,138,176,0.8);
    }
    @keyframes sparkle-fade {
      0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
    }
    body.brat-mode .sparkle {
      background: #b08aff;
      box-shadow: 0 0 10px rgba(176,138,255,0.8);
    }

    /* Brat Mode Styles */
    body.brat-mode { background: #1a0b2e; }
    body.brat-mode .slide-card { background: rgba(30, 10, 40, 0.96); }
    body.brat-mode .btn-pink { background: #b08aff; border-color: #a07aff; }
    body.brat-mode .days-counter { color: #b08aff; }
    body.brat-mode .heart { color: #b08aff; text-shadow: 0 0 12px rgba(176, 138, 255, 0.45); }

    @media (max-width: 768px) {
      .slide-meta { flex-direction: column; align-items: center; text-align: center; }
      .slide-header { max-width: 100%; margin-bottom: 1rem; min-height: auto; }
      .slide-header h1 { font-size: 1.9rem; }
      .btn-pink { flex: 1 1 calc(33.33% - 0.5rem); min-width: 80px; padding: 0.5rem; font-size: 0.85rem; }
      .slide-actions { width: 100%; }
    }
  </style>
</head>
<body>
  <div id="youtube-player" style="position:absolute; width:0; height:0; border:0; pointer-events:none; visibility:hidden;"></div>
  <div class="slideshow">
    <div class="card slide-card">
      <div class="slide-view">
        <img id="slideImage" src="images/PXL_20250609_000925302.jpg" alt="RURU gallery image" style="position: absolute; opacity: 1;">
        <img id="slideImageNext" src="" alt="" style="position: absolute; opacity: 0;">
        <div class="heart-rain" aria-hidden="true"></div>
      </div>
      <div class="card-body">
        <span id="daysCounter" class="days-counter">Loading days...</span>
        <div class="slide-meta">
          <div class="slide-header">
            <h1>Ruru's wall</h1>
            <p id="slideName"></p>
            <p id="slideDesc">Ruru spending time doing what he likes.</p>
            <small id="slideIndex">1 / 10</small>
            <label class="brat-mode-toggle">
              <input type="checkbox" id="bratModeToggle"> Brat Mode 😈
            </label>
          </div>
          <div class="slide-actions">
            <button id="prevBtn" type="button" class="btn btn-pink btn-lg" title="Previous Slide">⬅️</button>
            <button id="kissBtn" type="button" class="btn btn-pink btn-lg">Kiss 💋</button>
            <button id="feedBtn" type="button" class="btn btn-pink btn-lg">Feed 🐟</button>
            <button id="stickerBtn" type="button" class="btn btn-pink btn-lg">Sticker ✨</button>
            <button id="nextBtn" type="button" class="btn btn-pink btn-lg" title="Next Slide">➡️</button>
            <button id="muteBtn" type="button" class="btn btn-pink btn-lg" title="Unmute music">🔇</button>
          </div>
        </div>
      </div>
      <div class="kiss-overlay" aria-hidden="true"></div> 
    </div>
  </div>

  <script>
    const slides = [
      'images/PXL_20250609_000925302.jpg',
      'images/PXL_20250813_115834316.jpg',
      'images/PXL_20250815_043254288.jpg',
      'images/IMG_20240517_214222_054.jpg',
      'images/PXL_20230106_093315319.jpg',
      'images/PXL_20230117_222641776.jpg',
      'images/PXL_20230831_115314741.jpg',
      'images/PXL_20241213_112359676.BURST-01.COVER.jpg',
      'images/PXL_20241231_093047041.jpg',
      'images/PXL_20250609_000916756.jpg'
    ];
    const img = document.getElementById('slideImage');
    const imgNext = document.getElementById('slideImageNext');
    let activeImg = img;
    let inactiveImg = imgNext;

    const indexLabel = document.getElementById('slideIndex');
    const slideName = document.getElementById('slideName');
    const slideDesc = document.getElementById('slideDesc');
    const heartRain = document.querySelector('.heart-rain');
    const kissBtn = document.getElementById('kissBtn');
    const feedBtn = document.getElementById('feedBtn');
    const stickerBtn = document.getElementById('stickerBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const muteBtn = document.getElementById('muteBtn');
    const kissOverlay = document.querySelector('.kiss-overlay');
    const bratModeToggle = document.getElementById('bratModeToggle');
    const daysCounter = document.getElementById('daysCounter');

    let currentSlide = 0;
    let timer = null;
    let lipVisible = false;
    const preloadedImages = [];

    const preloadImages = () => {
      slides.forEach((src) => {
        const img = new Image();
        img.src = src;
        preloadedImages.push(img);
      });
    };

    const createHeart = () => {
      const heart = document.createElement('span');
      heart.className = 'heart';
      heart.textContent = bratModeToggle.checked ? '🦴' : '❤';
      heart.style.left = `${Math.random() * 100}%`;
      heart.style.fontSize = `${1 + Math.random() * 1.2}rem`;
      heart.style.animationDuration = `${4 + Math.random() * 3}s`;
      heartRain.appendChild(heart);
      heart.addEventListener('animationend', () => heart.remove());
    };

    // Audio Context for chirping
    let audioCtx = null;
    const playChirp = () => {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(800, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.2);
    };

    const showKiss = () => {
      if (lipVisible) return;
      lipVisible = true;
      const lip = document.createElement('span');
      lip.className = 'lip';
      lip.textContent = '💋';
      const x = 10 + Math.random() * 80;
      const y = 10 + Math.random() * 80;
      lip.style.left = `${x}%`;
      lip.style.top = `${y}%`;
      kissOverlay.appendChild(lip);
      playChirp();
      const duration = 3000 + Math.random() * 1000;
      setTimeout(() => {
        lip.remove();
        lipVisible = false;
      }, duration);
    };

    const feedRuru = () => {
      const fish = document.createElement('span');
      fish.className = 'fish-animation';
      fish.textContent = '🐟';
      fish.style.left = '50%';
      fish.style.bottom = '20%';
      kissOverlay.appendChild(fish);
      playChirp();
      setTimeout(() => {
        fish.remove();
        const msg = bratModeToggle.checked ? "More! Bring me MORE FISH! 😈" : "Yum! Ruru is a happy boy! 🐧";
        slideName.textContent = msg;
      }, 1000);
    };

    const stickers = ['🎩', '🎀', '😎'];
    const slideViewElement = document.querySelector('.slide-view');
    const spawnSparkle = (x, y) => {
      const sparkle = document.createElement('div');
      sparkle.className = 'sparkle';
      sparkle.style.left = `${x}px`;
      sparkle.style.top = `${y}px`;
      slideViewElement.appendChild(sparkle);
      sparkle.addEventListener('animationend', () => sparkle.remove());
    };

    slideViewElement.addEventListener('click', (e) => {
      const rect = slideViewElement.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      spawnSparkle(x, y);
    });

    slideViewElement.addEventListener('touchstart', (e) => {
      const rect = slideViewElement.getBoundingClientRect();
      const x = e.touches[0].clientX - rect.left;
      const y = e.touches[0].clientY - rect.top;
      spawnSparkle(x, y);
    }, { passive: true });

    const spawnSticker = () => {
      const emoji = stickers[Math.floor(Math.random() * stickers.length)];
      const sticker = document.createElement('div');
      sticker.className = 'sticker-item';
      sticker.textContent = emoji;
      sticker.style.left = '40%';
      sticker.style.top = '40%';
      kissOverlay.appendChild(sticker);

      // Make Draggable
      let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
      sticker.onmousedown = dragMouseDown;
      sticker.ontouchstart = dragTouchStart;

      function dragMouseDown(e) {
        e.preventDefault();
        pos3 = e.clientX;
        pos4 = e.clientY;
        document.onmouseup = closeDragElement;
        document.onmousemove = elementDrag;
      }

      function dragTouchStart(e) {
        pos3 = e.touches[0].clientX;
        pos4 = e.touches[0].clientY;
        document.ontouchend = closeDragElement;
        document.ontouchmove = elementTouchDrag;
      }

      function elementDrag(e) {
        e.preventDefault();
        pos1 = pos3 - e.clientX;
        pos2 = pos4 - e.clientY;
        pos3 = e.clientX;
        pos4 = e.clientY;
        sticker.style.top = (sticker.offsetTop - pos2) + "px";
        sticker.style.left = (sticker.offsetLeft - pos1) + "px";
      }

      function elementTouchDrag(e) {
        if (e.cancelable) e.preventDefault();
        pos1 = pos3 - e.touches[0].clientX;
        pos2 = pos4 - e.touches[0].clientY;
        pos3 = e.touches[0].clientX;
        pos4 = e.touches[0].clientY;
        sticker.style.top = (sticker.offsetTop - pos2) + "px";
        sticker.style.left = (sticker.offsetLeft - pos1) + "px";
      }

      function closeDragElement() {
        document.onmouseup = null;
        document.onmousemove = null;
        document.ontouchend = null;
        document.ontouchmove = null;
      }
    };

    let isTransitioning = false;
    const updateSlide = (position, force = false) => {
      if (isTransitioning) return;
      if (position < 0) position = slides.length - 1;
      if (position >= slides.length) position = 0;

      const isInitial = imgNext.src === '' && currentSlide === 0 && position === 0;
      if (!isInitial && !force && position === currentSlide) return;

      currentSlide = position;

      if (bratModeToggle.checked) {
        slideName.textContent = 'I am the ruler of this domain. 😈';
        slideDesc.textContent = 'Ruru being a little brat.';
      } else {
        slideName.textContent = 'A cozy little penguin slideshow.';
        slideDesc.textContent = 'Ruru spending time doing what he likes.';
      }
      indexLabel.textContent = (currentSlide + 1) + ' / ' + slides.length;

      if (isInitial) {
        activeImg.src = slides[0];
        activeImg.alt = 'Cute penguin image 1';
        activeImg.style.opacity = '1';
        inactiveImg.style.opacity = '0';
        return;
      }

      isTransitioning = true;
      inactiveImg.src = slides[currentSlide];
      inactiveImg.alt = 'Cute penguin image ' + (currentSlide + 1);

      // Start cross-fade
      inactiveImg.style.opacity = '1';
      activeImg.style.opacity = '0';

      // Swap which image is active
      const temp = activeImg;
      activeImg = inactiveImg;
      inactiveImg = temp;

      setTimeout(() => {
        isTransitioning = false;
      }, 500); // Slightly longer than transition duration (0.45s) to be safe
    };

    const nextSlide = () => updateSlide(currentSlide + 1);
    const prevSlide = () => updateSlide(currentSlide - 1);

    const setAutoplay = (enabled) => {
      if (enabled) {
        timer = setInterval(nextSlide, 4500);
      } else {
        clearInterval(timer);
      }
    };

    kissBtn.addEventListener('click', showKiss);
    feedBtn.addEventListener('click', feedRuru);
    stickerBtn.addEventListener('click', spawnSticker);
    prevBtn.addEventListener('click', () => { prevSlide(); setAutoplay(false); setAutoplay(true); });
    nextBtn.addEventListener('click', () => { nextSlide(); setAutoplay(false); setAutoplay(true); });

    const syncBratMode = () => {
        if (bratModeToggle.checked) {
            document.body.classList.add('brat-mode');
            localStorage.setItem('bratMode', 'enabled');
        } else {
            document.body.classList.remove('brat-mode');
            localStorage.setItem('bratMode', 'disabled');
        }
        updateSlide(currentSlide, true);
    };

    bratModeToggle.addEventListener('change', syncBratMode);

    const updateDaysCounter = () => {
        const start = new Date('2022-08-13');
        const now = new Date();
        const diff = now - start;
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        daysCounter.textContent = `Ruru has been with us for ${days} days`;
    };

    // YouTube Player API
    let player;
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    const firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    window.onYouTubeIframeAPIReady = () => {
      player = new YT.Player('youtube-player', {
        height: '0',
        width: '0',
        videoId: 'JkiglO98YYo',
        playerVars: {
          'autoplay': 1,
          'loop': 1,
          'playlist': 'JkiglO98YYo',
          'controls': 0,
          'showinfo': 0,
          'rel': 0,
          'mute': 1
        },
        events: {
          'onReady': (event) => {
            event.target.playVideo();
          }
        }
      });
    };

    muteBtn.addEventListener('click', (e) => {
      e.preventDefault();
      if (player && player.isMuted()) {
        player.unMute();
        muteBtn.textContent = '🔊';
        muteBtn.title = 'Mute music';
      } else if (player) {
        player.mute();
        muteBtn.textContent = '🔇';
        muteBtn.title = 'Unmute music';
      }
    });

    setAutoplay(true);
    setInterval(createHeart, 400);
    for (let i = 0; i < 8; i += 1) {
      setTimeout(createHeart, i * 260);
    }

    // Restore Brat Mode state
    if (localStorage.getItem('bratMode') === 'enabled') {
        bratModeToggle.checked = true;
    } else if (localStorage.getItem('bratMode') === 'disabled') {
        bratModeToggle.checked = false;
    }
    syncBratMode();

    updateSlide(0);
    updateDaysCounter();
    preloadImages();
    setInterval(updateDaysCounter, 1000 * 60 * 60); // Update every hour
  </script>
</body>
</html>

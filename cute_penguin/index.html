<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cute Penguin Slideshow</title>
  <meta name="description" content="Hidden penguin slideshow at morfiadakis.au/cute_penguin">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <link rel="canonical" href="https://morfiadakis.au/cute_penguin/">
  <link rel="stylesheet" href="../css/bootstrap.min.css">
  <style>
    body { min-height:100vh; background:#020617; color:#f8fafc; display:flex; align-items:center; justify-content:center; margin:0; padding:1.5rem; font-family:system-ui, sans-serif; }
    .slideshow { width:100%; max-width:980px; }
    .slide-card { border:none; background:rgba(15,23,42,0.92); box-shadow:0 30px 80px rgba(8,18,50,.45); }
    .slide-view { position:relative; overflow:hidden; border-radius:1rem; min-height:420px; background:#000; display:flex; align-items:center; justify-content:center; }
    .slide-view img { position:relative; z-index:0; width:100%; height:auto; max-height:calc(100vh - 260px); object-fit:contain; transition:opacity .45s ease; display:block; }
    .heart-rain { position:absolute; inset:0; pointer-events:none; overflow:hidden; z-index:2; }
    .heart-rain .heart { position:absolute; top:-2rem; color:#ff8ab0; font-size:1.25rem; opacity:0; animation:rain 5s linear infinite; text-shadow:0 0 12px rgba(255,138,176,.45); }
    @keyframes rain { 0% { transform: translate3d(0,-20px,0) scale(0.7); opacity:0; }
    10% { opacity:.9; }
    100% { transform: translate3d(0,110vh,0) scale(0.85); opacity:0; }}
    .slide-meta { display:flex; justify-content:space-between; align-items:center; gap:1rem; flex-wrap:wrap; }
    .slide-meta small { color:#cbd5e1; }
    .details { margin-top:1rem; border:1px solid rgba(148,163,184,.2); }
    .details p { margin:0; }    @media (max-width: 640px) {
      .slide-meta { flex-direction:column; align-items:flex-start; }
    }
  </style>
</head>
<body>
  <div class="slideshow">
    <div class="card slide-card">
      <div class="slide-view">
        <img id="slideImage" src="images/PXL_20250609_000925302.jpg" alt="RURU gallery image" loading="lazy">
        <div class="heart-rain" aria-hidden="true"></div>
      </div>
      <div class="card-body">
        <div class="slide-meta">
          <div>
            <h2 class="h4 mb-1">RURU Gallery</h2>
            <small id="slideIndex">1 / 10</small>
          </div>
        </div>
        <div id="detailsPanel" class="details p-3 bg-white text-dark rounded-3">
          <p id="slideName" class="mb-0">Welcome to the RURU Gallery — a refined showcase of curated imagery with softly animated accents.</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const slides = [
      'images/PXL_20250609_000925302.jpg',
      'images/PXL_20250813_115834316.jpg',
      'images/PXL_20250815_043254288.jpg',
      'images/IMG_20240517_214222_054.jpg',
      'images/PXL_20230106_093315319.jpg',
      'images/PXL_20230117_222641776.jpg',
      'images/PXL_20230831_115314741.jpg',
      'images/PXL_20241213_112359676.BURST-01.COVER.jpg',
      'images/PXL_20241231_093047041.jpg',
      'images/PXL_20250609_000916756.jpg'
    ];
    const img = document.getElementById('slideImage');
    const indexLabel = document.getElementById('slideIndex');
    const slideName = document.getElementById('slideName');
    const heartRain = document.querySelector('.heart-rain');
    let currentSlide = 0;
    let timer = null;

    const createHeart = () => {
      const heart = document.createElement('span');
      heart.className = 'heart';
      heart.textContent = '❤';
      heart.style.left = `${Math.random() * 100}%`;
      heart.style.fontSize = `${1 + Math.random() * 1.2}rem`;
      heart.style.animationDuration = `${4 + Math.random() * 3}s`;
      heart.style.opacity = '0';
      heartRain.appendChild(heart);
      heart.addEventListener('animationend', () => heart.remove());
    };

    const updateSlide = (position) => {
      if (position < 0) position = slides.length - 1;
      if (position >= slides.length) position = 0;
      currentSlide = position;
      img.style.opacity = '0';
      setTimeout(() => {
        img.src = slides[currentSlide];
        img.alt = 'Cute penguin image ' + (currentSlide + 1);
        indexLabel.textContent = (currentSlide + 1) + ' / ' + slides.length;
        slideName.textContent = 'A cozy little penguin slideshow.';
        img.style.opacity = '1';
      }, 150);
    };

    const nextSlide = () => updateSlide(currentSlide + 1);
    const prevSlide = () => updateSlide(currentSlide - 1);

    const setAutoplay = (enabled) => {
      if (enabled) {
        timer = setInterval(nextSlide, 4500);
      } else {
        clearInterval(timer);
      }
    };

    document.querySelector('.slide-view').addEventListener('click', () => {
      nextSlide();
    });

    setAutoplay(true);
    setInterval(createHeart, 400);
    for (let i = 0; i < 8; i += 1) {
      setTimeout(createHeart, i * 260);
    }

    updateSlide(0);
  </script>
</body>
</html>

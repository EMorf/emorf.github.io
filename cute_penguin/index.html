<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ruru's wall</title>
  <meta name="description" content="Ruru spending time doing what he likes in a full-screen gallery.">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <link rel="canonical" href="https://morfiadakis.au/cute_penguin/">
  <link rel="icon" href="images/IMG_20240517_214222_054.jpg" type="image/jpeg">
  <link rel="stylesheet" href="../css/bootstrap.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
    html, body { height: 100%; overflow: hidden; }
    body { height: 100vh; background: #020617; color: #f8fafc; display: flex; align-items: center; justify-content: center; margin: 0; padding: 0; font-family: 'Roboto', 'Helvetica Neue', Arial, sans-serif; position: relative; }
    .slideshow { width: 100%; max-width: 500px; height: 100%; max-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .slide-card { width: 100%; height: 100%; border: none; background: rgba(10,15,30,0.96); box-shadow: 0 30px 80px rgba(8,18,50,.45); display: flex; flex-direction: column; overflow: hidden; }
    .slide-view { position: relative; overflow: hidden; flex: 1; background: #000; display: flex; align-items: center; justify-content: center; }
    .slide-view img { position: relative; z-index: 0; max-width: 100%; max-height: 100%; width: auto; height: auto; object-fit: contain; transition: opacity .45s ease; display: block; }
    .heart-rain { position:absolute; inset:0; pointer-events:none; overflow:hidden; z-index:2; }
    .heart-rain .heart { position:absolute; top:-2rem; color:#ff8ab0; font-size:1.25rem; opacity:0; animation:rain 5s linear infinite; text-shadow:0 0 12px rgba(255,138,176,.45); }
    @keyframes rain { 0% { transform: translate3d(0,-20px,0) scale(0.7); opacity:0; }
      10% { opacity:.9; }
      100% { transform: translate3d(0,110vh,0) scale(0.85); opacity:0; }
    }
    .card-body { padding: 1.5rem 1.75rem 2rem; display: flex; flex-direction: column; justify-content: flex-start; flex-shrink: 0; }
    .slide-meta { display:flex; justify-content:space-between; align-items:flex-start; gap:1.25rem; flex-wrap:wrap; }
    .slide-header { max-width:calc(100% - 180px); }
    .slide-header h1 { font-size:2.35rem; font-weight:700; margin:0; letter-spacing:.02em; }
    .slide-header p { margin:.5rem 0 0; color:#cbd5e1; font-size:1rem; line-height:1.55; }
    .slide-meta small { color:#7f9cf5; display:block; margin-top:.75rem; }
    .btn-pink { background:#ff8ab0; border-color:#ff7aa0; color:#111; font-weight:700; box-shadow:0 12px 26px rgba(255,138,176,.18); }
    .btn-pink:hover, .btn-pink:focus { background:#ff6b8a; border-color:#ff5b7b; color:#fff; }
    .slide-actions { display:flex; gap:0.75rem; align-items:center; }
    .kiss-overlay { position:absolute; inset:0; pointer-events:none; z-index:999; }
    .lip { position:absolute; font-size:3.25rem; transform:translate(-50%,-50%) scale(0.9); animation:pop 0.18s ease-out forwards; }
    @keyframes pop { 0% { transform:translate(-50%,-50%) scale(0.5); opacity:0; }
      60% { transform:translate(-50%,-50%) scale(1.12); opacity:1; }
      100% { transform:translate(-50%,-50%) scale(1); opacity:1; }
    }
    @media (max-width: 768px) {
      .slide-meta { flex-direction: column; align-items: flex-start; }
      .slide-header { max-width: 100%; }
      .slide-header h1 { font-size: 1.9rem; }
      .btn-pink { width: 100%; margin-top: 1rem; }
    }
  </style>
</head>
<body>
  <div id="youtube-player" style="position:absolute; width:0; height:0; border:0; pointer-events:none; visibility:hidden;"></div>
  <div class="slideshow">
    <div class="card slide-card">
      <div class="slide-view">
        <img id="slideImage" src="images/PXL_20250609_000925302.jpg" alt="RURU gallery image" loading="lazy">
        <div class="heart-rain" aria-hidden="true"></div>
      </div>
      <div class="card-body">
        <div class="slide-meta">
          <div class="slide-header">
            <h1>Ruru's wall</h1>
            <p>Ruru spending time doing what he likes.</p>
            <small id="slideIndex">1 / 10</small>
          </div>
          <div class="slide-actions">
            <button id="kissBtn" type="button" class="btn btn-pink btn-lg">Kiss Ruru</button>
            <button id="muteBtn" type="button" class="btn btn-pink btn-lg" title="Unmute music">🔇</button>
          </div>
        </div>
      </div>
      <div class="kiss-overlay" aria-hidden="true"></div> 
    </div>
  </div>

  <script>
    const slides = [
      'images/PXL_20250609_000925302.jpg',
      'images/PXL_20250813_115834316.jpg',
      'images/PXL_20250815_043254288.jpg',
      'images/IMG_20240517_214222_054.jpg',
      'images/PXL_20230106_093315319.jpg',
      'images/PXL_20230117_222641776.jpg',
      'images/PXL_20230831_115314741.jpg',
      'images/PXL_20241213_112359676.BURST-01.COVER.jpg',
      'images/PXL_20241231_093047041.jpg',
      'images/PXL_20250609_000916756.jpg'
    ];
    const img = document.getElementById('slideImage');
    const indexLabel = document.getElementById('slideIndex');
    const heartRain = document.querySelector('.heart-rain');
    const kissBtn = document.getElementById('kissBtn');
    const muteBtn = document.getElementById('muteBtn');
    const kissOverlay = document.querySelector('.kiss-overlay');
    let currentSlide = 0;
    let timer = null;
    let lipVisible = false;

    const createHeart = () => {
      const heart = document.createElement('span');
      heart.className = 'heart';
      heart.textContent = '❤';
      heart.style.left = `${Math.random() * 100}%`;
      heart.style.fontSize = `${1 + Math.random() * 1.2}rem`;
      heart.style.animationDuration = `${4 + Math.random() * 3}s`;
      heartRain.appendChild(heart);
      heart.addEventListener('animationend', () => heart.remove());
    };

    const showKiss = () => {
      if (lipVisible) return;
      lipVisible = true;
      const lip = document.createElement('span');
      lip.className = 'lip';
      lip.textContent = '💋';
      lip.style.left = `${10 + Math.random() * 80}%`;
      lip.style.top = `${10 + Math.random() * 80}%`;
      kissOverlay.appendChild(lip);
      const duration = 3000 + Math.random() * 1000;
      setTimeout(() => {
        lip.remove();
        lipVisible = false;
      }, duration);
    };

    const updateSlide = (position) => {
      if (position < 0) position = slides.length - 1;
      if (position >= slides.length) position = 0;
      currentSlide = position;
      img.style.opacity = '0';
      setTimeout(() => {
        img.src = slides[currentSlide];
        img.alt = 'Cute penguin image ' + (currentSlide + 1);
        indexLabel.textContent = (currentSlide + 1) + ' / ' + slides.length;
        img.style.opacity = '1';
      }, 150);
    };

    const nextSlide = () => updateSlide(currentSlide + 1);
    const prevSlide = () => updateSlide(currentSlide - 1);

    const setAutoplay = (enabled) => {
      if (enabled) {
        timer = setInterval(nextSlide, 4500);
      } else {
        clearInterval(timer);
      }
    };

    document.querySelector('.slide-view').addEventListener('click', () => {
      nextSlide();
    });
    kissBtn.addEventListener('click', showKiss);

    // YouTube Player API
    let player;
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    const firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    window.onYouTubeIframeAPIReady = () => {
      player = new YT.Player('youtube-player', {
        height: '0',
        width: '0',
        videoId: 'JkiglO98YYo',
        playerVars: {
          'autoplay': 1,
          'loop': 1,
          'playlist': 'JkiglO98YYo',
          'controls': 0,
          'showinfo': 0,
          'rel': 0,
          'mute': 1
        },
        events: {
          'onReady': (event) => {
            event.target.playVideo();
          }
        }
      });
    };

    muteBtn.addEventListener('click', () => {
      if (player && player.isMuted()) {
        player.unMute();
        muteBtn.textContent = '🔊';
        muteBtn.title = 'Mute music';
      } else if (player) {
        player.mute();
        muteBtn.textContent = '🔇';
        muteBtn.title = 'Unmute music';
      }
    });

    setAutoplay(true);
    setInterval(createHeart, 400);
    for (let i = 0; i < 8; i += 1) {
      setTimeout(createHeart, i * 260);
    }

    updateSlide(0);
  </script>
</body>
</html>
